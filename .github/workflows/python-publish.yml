# Publish LUAF to PyPI (standard Python publish workflow).
# Repo: https://github.com/Euroswarms-Institute/LUAF
#
# Triggers: GitHub Release published, or manual run from Actions tab.
#
# Auth: Use either (A) PyPI Trusted Publishing (OIDC) or (B) PYPI_API_TOKEN secret.
# (A) Trusted Publishing: PyPI → Your project → Publish → Add trusted publisher
#     (GitHub Actions, repo Euroswarms-Institute/LUAF, workflow python-publish.yml).
#     Then remove the password line below and set environment: pypi (optional).
# (B) Token: Create token at https://pypi.org/manage/account/token/
#     Add repo secret PYPI_API_TOKEN. Keep the password line below.

name: Publish Python Package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # For token-based auth: add secret PYPI_API_TOKEN and leave this line.
          # For Trusted Publishing: remove this line and configure OIDC on PyPI.
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
